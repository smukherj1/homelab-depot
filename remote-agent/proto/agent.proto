
syntax = "proto3";

package homelabdepot.remoteagent;

service Agent {
    // Get the agent status. Can be used to check if the agent process is
    // alive or has crashed.
    rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

    /// Session scoped methods

    // Creates a dedicated session with its own workspace where files and
    // be uploaded to and downloaded from. All executed commands have the
    // workspace directory as their working directory.
    // Only one session can be active at a time. The method returns an
    // error
    rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);

    // Upload files to a session.
    rpc Upload(stream UploadRequest) returns (UploadResponse);

    // Download files download files from a session.
    rpc Download(DownloadRequest) returns (stream DownloadResponse);

    // Gets information about a file path in a session, i.e., details about
    // the file or the directory represented by the path.
    rpc GetPathMetadata(GetPathMetadataRequest) returns (GetPathMetadataResponse);

    // Executes a command in the session.
    rpc Execute(ExecuteRequest) returns (ExecuteResponse);

    // Complete a session. This deletes all files generated by that session. A session
    // is auto-completed if there's no session activity for over 5 mins. Calling any
    // session method constitues as session activity. Any open long running requests
    // like uploading, downloading and running commands also counts as session
    // activity. The 5 min timer starts only after the session method completes or
    // is aborted.
    rpc CompleteSession(CompleteSessionRequest) returns(CompleteSessionResponse);

    // Get information about a session. Can also be used to keep a session alive on
    // the agent.
    rpc GetSession(GetSessionRequest) returns(GetSessionResponse);

    /// End of Session scoped methods.
}

message GetStatusRequest {}
message GetStatusResponse {
    // Number of active sessions. Should either be 0 or 1.
    int32 active_sessions = 1;
}

message CreateSessionRequest {
    // Session ID to create.
    string session_id = 1;
}
message CreateSessionResponse {}

// Indicates the file that will be uploaded relative to the
// session's working directory. All intermediate directories
// in the file's path will be automatically created.
message UploadFileHeader{
    // Name of file to create. Must be a relative path without any
    // directory escapes, like "..". Also, using "." to reference
    // the directory is not allowed like "a/./b" will be rejected.
    string filename = 1;

    // File permissions in Unix format.
    uint32 permissions = 2;
}

message UploadFileChunk{
    // Must be 0 for the first chunk and (previous offset + len(previous data)) for
    // every subsequent chunk.
    uint64 offset = 1;
    // The bytes in this chunk. Should be lower than 3.9 MB to stay within GRPC
    // message limits.
    bytes data = 2;
    
    // Should be set to true for the final chunk.
    bool final = 3;
    // Digest of the file. Must be set for the final chunk. Will be used by the
    // agent to verify the integrity of the uploaded file matches what the
    // caller expects / transferred.
    string sha256_digest = 4;
}

// Stream to upload the contents of a file to a session. The
// first message *must be* the header followed by chunks.
// Resuming partial uploads is not supported.
message UploadRequest {
    string session_id = 1;
    oneof request {
        UploadFileHeader header = 2;
        UploadFileChunk chunk = 3;
    }
}
message UploadResponse {
    // The offset of the next chunk expected by the server.
    uint64 next_offset = 1;
}

message DownloadRequest {
    string session_id = 1;
    // Name of the file to download from the session's working
    // directory. The filename must be a simple relative path and
    // has the same constraints as the filenames accept by Upload,
    string filename = 2;
}

message DownloadFileChunk{
    // The offset of the chunk being sent. Will start with 0 and be
    // previous offset + len(previous chunk data) for subsequent
    // chunks.
    uint64 offset = 1;
    bytes data = 2;

    // Should be set to true for the final chunk.
    bool final = 3;
    // Digest of the file. Will be set for the final chunk. Can be used by the
    // caller to verify the integrity of the downloaded file matches what the
    // agent transferred.
    string sha256_digest = 4;
}

// Stream to download the contents of a file from a session. The
// first response *will be* the header followed by chunks.
// Resuming partial downloads is not supported.
message DownloadResponse {
    string session_id = 1;
    oneof response {
        DownloadFileChunk chunk = 2;
    }
}

message GetPathMetadataRequest {
    string session_id = 1;
    // The relative path in the session to return details
    // about.
    string path = 2;
}

message FileMetadata {
    // Name of the file within a directory.
    string name = 1;
    // Size of the file in bytes.
    uint64 size = 2;
    // TODO: Also add details like creation, modification times
    // in unix epoch and file mode bits.
}
message SubdirectoryMetadata {
    // Name of the sub-directory within a directory.
    string name = 1;
}
message DirectoryMetadata{
    // One or more files in this directory.
    repeated FileMetadata file_metadata = 1;
    // One or more sub-directories in this directory. Only
    // returns immediate child directories.
    repeated SubdirectoryMetadata subdirectory_metadata = 2;
}
message GetPathMetadataResponse {
    oneof response {
        // Returned when the requested path is a file.
        FileMetadata file_metadata = 1;
        // Returns when the requested path is a directory.
        DirectoryMetadata directory_metadata = 2;
    }
}

message ExecEnv {
    string key = 1;
    string value = 2;
}

message ExecuteRequest {
    string session_id = 1;
    // The command (along with its arguments) to run.
    repeated string cmd = 2;
    // The OS env for the command execution.
    repeated ExecEnv exec_env = 3;
}
message ExecuteResponse {
    // Exit code of the executed command.
    int32 exit_code = 1;
    // Logs from the executed command.
    string stdout = 2;
    string stderr = 3;
}

message CompleteSessionRequest {
    string session_id = 1;
}
message CompleteSessionResponse {}

message GetSessionRequest {
    string session_id = 1;
}
message GetSessionResponse {}